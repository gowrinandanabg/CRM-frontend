<div class="login-container">
  <div class="login-form-wrapper">
    <div class="login-form-card">
      <div class="login-box">
        <h5 class="login-title">Orque CRM</h5>

        @if (!submitted) {
          <p class="login-subtitle">Enter your email and we'll send you a link to reset your password.</p>

          <form (ngSubmit)="submit()">
            <div class="login-form-fields">
              <div class="login-input-group">
                <label class="login-input-label" for="emailInput">Email</label>
                <input id="emailInput"
                       type="email"
                       name="email"
                       class="login-input-field"
                       placeholder="Enter your email"
                       [(ngModel)]="email">
              </div>
            </div>

            @if (errorMessage) {
              <div class="login-error">{{ errorMessage }}</div>
            }

            <button
              class="login-button-orange"
              type="submit"
              [disabled]="loading">
              @if (loading) {
                <span style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                  <span style="display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite;"></span>
                  Sending...
                </span>
              } @else {
                SEND RESET LINK
              }
            </button>

            <div class="login-extras" style="justify-content: center; margin-top: 20px;">
              <div class="login-forgot-password" (click)="backToLogin()">Back to login</div>
            </div>
          </form>
        } @else {
          <p class="login-subtitle">If an account with that email exists, a password reset link has been sent. Please check your inbox.</p>

          <button
            class="login-button-orange"
            type="button"
            (click)="backToLogin()">
            BACK TO LOGIN
          </button>
        }
      </div>
    </div>
  </div>
</div>
