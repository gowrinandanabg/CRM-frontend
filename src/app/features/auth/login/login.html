<div class="login-container">
  <div class="login-form-wrapper">
    <div class="login-form-card">
      <div class="login-box">
        <h5 class="login-title">Orque CRM</h5>
        <p class="login-subtitle">Login to your account</p>

        <!-- Login Form -->
        <form (ngSubmit)="login()">
          <div class="login-form-fields">
            <div class="login-input-group">
              <label class="login-input-label" for="usernameInput">Username</label>
              <input id="usernameInput"
                     type="text"
                     name="usernameOrEmail"
                     class="login-input-field"
                     placeholder="Enter your username"
                     [(ngModel)]="usernameOrEmail">
            </div>

            <div class="login-input-group">
              <label class="login-input-label" for="passwordInput">Password</label>
              <div class="login-password-wrapper">
                <input id="passwordInput"
                       type="password"
                       name="password"
                       #pwdInput
                       class="login-password-input"
                       placeholder="Enter your password"
                       [(ngModel)]="password">
                <button type="button"
                        class="login-pwd-toggle"
                        (click)="pwdInput.type = pwdInput.type === 'password' ? 'text' : 'password'"
                        title="Toggle password visibility"
                        aria-label="Toggle password visibility">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2"
                       stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          @if (errorMessage) {
            <div class="login-error">{{ errorMessage }}</div>
          }

          <div class="login-extras">
            <div class="login-forgot-password" [routerLink]="['/forgot-password']">Forgot password?</div>
          </div>

          <button
            class="login-button-orange"
            type="submit"
            [disabled]="loading">
            @if (loading) {
              <span style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                <span style="display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite;"></span>
                Logging in...
              </span>
            } @else {
              LOGIN
            }
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
